<style>
:root{
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:30px; --r-pill:999px;
  --font-ui:"Lexend",system-ui,sans-serif;
  --font-display:"Fredoka","Lexend",system-ui,sans-serif;
  --app-w:430px;
  --ease:cubic-bezier(.22,1,.36,.18);
  --t-fast:140ms; --t-mid:240ms; --t-slow:300ms;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--font-ui);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ---------- THEMES ---------- */
body.theme-city{
  --bg:#E7E5DD; --app-bg:#F6F5F0; --surface:#FFFFFF; --surface-2:#F0EFE8; --surface-3:#E9E7DE;
  --text:#23211C; --text-dim:#736E62; --text-soft:#9b958680;
  --primary:#F2701A; --primary-ink:#FFFFFF; --primary-soft:#FFE7D4;
  --accent:#F2701A; --accent-2:#1C9C8E;
  --correct:#1B9E5F; --correct-soft:#DBF3E5; --wrong:#E03A3F; --wrong-soft:#FBE0E0;
  --border:#E5E2D8; --shadow:rgba(60,52,32,.13);
  --texture:radial-gradient(circle at 1px 1px, rgba(120,110,80,.08) 1px, transparent 0);
  --texture-size:22px 22px;
  --star:transparent;
}
body.theme-space{
  --bg:#0B0B18; --app-bg:#171729; --surface:#21213C; --surface-2:#2A2A48; --surface-3:#323256;
  --text:#EEEEFF; --text-dim:#9C9CC8; --text-soft:#6a6a9e55;
  --primary:#22D3EE; --primary-ink:#062330; --primary-soft:#123a44;
  --accent:#36E0D0; --accent-2:#A78BFA;
  --correct:#2DD4A7; --correct-soft:#103a33; --wrong:#FF6B6B; --wrong-soft:#3d1f27;
  --border:#33335C; --shadow:rgba(0,0,0,.45);
  --texture:none; --texture-size:auto;
  --star:#ffffff;
}
body.theme-forest{
  --bg:#DCE7DC; --app-bg:#F1F6F0; --surface:#FFFFFF; --surface-2:#E9F1E8; --surface-3:#DEEBDD;
  --text:#182C20; --text-dim:#5C7062; --text-soft:#7a907f50;
  --primary:#1B5E3F; --primary-ink:#FFFFFF; --primary-soft:#D6EBDE;
  --accent:#2FA372; --accent-2:#79C9A0;
  --correct:#1B9E5F; --correct-soft:#D9F0E2; --wrong:#D34038; --wrong-soft:#F7DEDC;
  --border:#D7E4D6; --shadow:rgba(27,60,40,.14);
  --texture:radial-gradient(circle at 1px 1px, rgba(40,110,70,.07) 1px, transparent 0);
  --texture-size:24px 24px;
  --star:transparent;
}
body.theme-ocean{
  --bg:#D5E4F0; --app-bg:#EAF3F9; --surface:#FFFFFF; --surface-2:#E0EDF6; --surface-3:#D4E6F2;
  --text:#0C2A45; --text-dim:#557693; --text-soft:#6f93ad50;
  --primary:#0D4C82; --primary-ink:#FFFFFF; --primary-soft:#D2E6F5;
  --accent:#1BABA0; --accent-2:#56C7D8;
  --correct:#0E9C77; --correct-soft:#D2F0E7; --wrong:#E03A3F; --wrong-soft:#FAE0E0;
  --border:#D1E2EE; --shadow:rgba(13,60,102,.16);
  --texture:repeating-radial-gradient(circle at 50% -20%, transparent 0 38px, rgba(43,160,180,.05) 39px 40px);
  --texture-size:auto;
  --star:transparent;
}

/* ---------- STAGE / DEVICE ---------- */
#stage{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(120% 80% at 50% -10%, color-mix(in oklab, var(--accent) 9%, var(--bg)) 0%, var(--bg) 60%);
}
#device{
  position:relative;
  width:min(var(--app-w), 100vw);
  height:min(932px, 100vh);
  background:var(--app-bg);
  background-image:var(--texture); background-size:var(--texture-size);
  overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow:0 30px 80px -20px var(--shadow), 0 0 0 1px var(--border);
}
@media(min-width:480px){
  #device{ border-radius:38px; height:min(900px, 96vh); box-shadow:0 40px 90px -24px var(--shadow), 0 0 0 1px var(--border); }
}
html.vt-ios-keyboard-lock,
html.vt-ios-keyboard-lock body{
  overflow:hidden;
  height:100%;
}
html.vt-ios-keyboard-lock body{
  position:fixed;
  inset:0;
  width:100%;
}
html.vt-ios-keyboard-lock #stage{
  align-items:flex-start;
  justify-content:center;
  height:var(--vt-visible-height, 100%);
  min-height:var(--vt-visible-height, 100%);
  overflow:hidden;
}
html.vt-ios-keyboard-lock #device{
  height:var(--vt-device-lock-height, min(932px, 100vh));
  max-height:100%;
}
@media(min-width:480px){
  html.vt-ios-keyboard-lock #device{height:var(--vt-device-lock-height, min(900px, 96vh));}
}
html.vt-ios-keyboard-lock .vt-quiz-scroll{
  overflow:hidden;
  padding-bottom:14px !important;
}
html.vt-ios-keyboard-lock .vt-type-question{
  min-height:0;
  gap:14px !important;
}
html.vt-ios-keyboard-lock .vt-type-prompt{
  flex:0 1 auto;
}
html.vt-ios-keyboard-lock .vt-type-answer{
  margin-top:auto !important;
  padding-bottom:max(8px, env(safe-area-inset-bottom));
  flex:0 0 auto;
}
html.vt-ios-keyboard-lock .vt-type-answer .field{
  font-size:20px;
  padding:14px 16px;
}
html.vt-ios-keyboard-lock .vt-type-answer .btn{
  padding:14px 18px;
}
@media (min-width:700px), (orientation:landscape) and (max-height:560px){
  :root{--app-w:980px;}
  #stage{align-items:center;}
  #device{
    width:min(980px, 100vw);
    height:min(760px, 100vh);
  }
  #root{min-height:0;}

/* star layer for space theme */
#starfield{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity var(--t-slow);}
body.theme-space #starfield{opacity:1;}

#root{position:relative;z-index:2;flex:1;min-height:0;display:flex;flex-direction:column;}

/* ---------- SCROLL ---------- */
.scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

/* ---------- TYPE ---------- */
.display{font-family:var(--font-display);font-weight:600;letter-spacing:-.01em;line-height:1.05;}
.h1{font-family:var(--font-display);font-weight:600;font-size:30px;line-height:1.08;letter-spacing:-.01em;}
.h2{font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.005em;}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);}
.dim{color:var(--text-dim);}

/* ---------- BUTTONS ---------- */
.btn{
  font-family:var(--font-ui);font-weight:600;font-size:17px;
  border:none;cursor:pointer;border-radius:var(--r-md);
  padding:16px 20px;display:inline-flex;align-items:center;justify-content:center;gap:10px;
  transition:transform var(--t-fast) var(--ease), filter var(--t-fast);
  user-select:none;
}
.btn:active{transform:translateY(1px) scale(.99);}
.btn-primary{
  background:var(--primary);color:var(--primary-ink);
  box-shadow:0 5px 0 -1px color-mix(in oklab, var(--primary) 70%, #000 28%);
}
.btn-primary:active{box-shadow:0 2px 0 -1px color-mix(in oklab, var(--primary) 70%, #000 28%);transform:translateY(3px) scale(.997);}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
.btn-ghost{background:var(--surface-2);color:var(--text);}
.btn-ghost:active{background:var(--surface-3);}
.btn-block{display:flex;width:100%;}

/* ---------- CARDS ---------- */
.card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);}

/* ---------- INPUTS ---------- */
.field{
  width:100%;font-family:var(--font-ui);font-size:20px;font-weight:500;
  padding:16px 18px;border-radius:var(--r-md);border:2px solid var(--border);
  background:var(--surface);color:var(--text);outline:none;
  transition:border-color var(--t-fast), box-shadow var(--t-fast);
}
.field:focus{border-color:var(--accent);box-shadow:0 0 0 4px color-mix(in oklab, var(--accent) 22%, transparent);}
.field::placeholder{color:var(--text-dim);opacity:.6;}

/* ---------- ANIMATIONS ---------- */
@keyframes popIn{from{transform:translateY(10px) scale(.985);}to{transform:none;}}
@keyframes slideIn{from{transform:translateX(24px);}to{transform:none;}}
@keyframes slideOut{from{opacity:1;transform:none;}to{opacity:0;transform:translateX(-26px);}}
@keyframes shake{10%,90%{transform:translateX(-2px);}20%,80%{transform:translateX(4px);}30%,50%,70%{transform:translateX(-7px);}40%,60%{transform:translateX(7px);}}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes bobHappy{0%{transform:translateY(0) rotate(0);}30%{transform:translateY(-10px) rotate(-4deg);}60%{transform:translateY(0) rotate(3deg);}100%{transform:translateY(0) rotate(0);}}
@keyframes pulseRing{0%{transform:scale(.8);opacity:.55;}100%{transform:scale(1.8);opacity:0;}}
@keyframes barFill{from{transform:scaleX(var(--from,0));}to{transform:scaleX(var(--to,1));}}
@keyframes confettiFall{to{transform:translateY(120px) rotate(var(--rot,360deg));opacity:0;}}
.q-enter{animation:slideIn var(--t-mid) var(--ease);}
.pop{animation:popIn var(--t-mid) var(--ease) both;}
.shake{animation:shake .4s both;}
.voki-float{animation:floaty 3.4s ease-in-out infinite;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;animation-iteration-count:1 !important;}
}

/* ---------- CONFETTI ---------- */
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:30;}
.confetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;
  animation:confettiFall var(--dur,800ms) linear forwards;}

/* ---------- TWEAKS host hidden by default ---------- */
#tweaks-root:empty{display:none;}
</style>

<script>
(function () {
  var isIOS = /iP(ad|hone|od)/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  if (!isIOS) return;

  var root = document.documentElement;
  var locked = false;
  var unlockTimer = null;
  var scrollY = 0;
  var editableSelector = [
    "input:not([type=file]):not([type=checkbox]):not([type=radio]):not([type=range]):not([type=color])",
    "textarea",
    "[contenteditable='true']"
  ].join(",");

  function isEditable(el) {
    return !!(el && el.matches && el.matches(editableSelector));
  }

  function keepAtTop() {
    if (!locked) return;
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  }

  function updateKeyboardViewport() {
    if (!locked) return;
    var vv = window.visualViewport;
    var visibleHeight = Math.round(vv ? vv.height : window.innerHeight);
    var maxDeviceHeight = window.matchMedia("(min-width:480px)").matches
      ? Math.min(900, Math.round(visibleHeight * 0.96))
      : Math.min(932, visibleHeight);
    root.style.setProperty("--vt-visible-height", visibleHeight + "px");
    root.style.setProperty("--vt-device-lock-height", Math.max(360, maxDeviceHeight) + "px");
    keepAtTop();
  }

  function lockKeyboardViewport() {
    clearTimeout(unlockTimer);
    if (locked) {
      updateKeyboardViewport();
      keepAtTop();
      return;
    }
    locked = true;
    scrollY = window.scrollY || document.documentElement.scrollTop || 0;
    root.classList.add("vt-ios-keyboard-lock");
    document.body.style.top = "0";
    updateKeyboardViewport();
    requestAnimationFrame(updateKeyboardViewport);
  }

  function unlockKeyboardViewport() {
    clearTimeout(unlockTimer);
    unlockTimer = setTimeout(function () {
      if (isEditable(document.activeElement)) return;
      locked = false;
      root.classList.remove("vt-ios-keyboard-lock");
      root.style.removeProperty("--vt-visible-height");
      root.style.removeProperty("--vt-device-lock-height");
      document.body.style.top = "";
      window.scrollTo(0, scrollY);
    }, 180);
  }

  document.addEventListener("focusin", function (event) {
    if (isEditable(event.target)) lockKeyboardViewport();
  }, true);
  document.addEventListener("focusout", unlockKeyboardViewport, true);
  window.addEventListener("scroll", keepAtTop, { passive: false });
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", updateKeyboardViewport);
    window.visualViewport.addEventListener("scroll", updateKeyboardViewport);
